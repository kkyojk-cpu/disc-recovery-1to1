<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회복 나침반 1:1 — 7기 대기 신청</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #f8f9fb; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); width: 100%; max-width: 400px; overflow: hidden; }
    .card-header { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%); padding: 32px 28px; color: #fff; }
    .card-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.6); margin-bottom: 10px; }
    .card-title { font-size: 20px; font-weight: 800; line-height: 1.4; }
    .card-body { padding: 28px; }
    .msg { font-size: 15px; color: #374151; line-height: 1.9; margin-bottom: 28px; }
    .kakao-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px; border-radius: 14px; background: #FEE500; color: #000; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; text-decoration: none; transition: opacity .2s; }
    .kakao-btn:hover { opacity: .88; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="card-eyebrow">회복 나침반 · 1:1 프로그램</div>
    <div class="card-title">7기 대기 신청 안내</div>
  </div>
  <div class="card-body">
    <p class="msg">
      현재 6기 모집이 마감되었습니다.<br><br>
      카카오 채팅으로 <strong>7기 성함</strong>을 보내주시면<br>
      7기 모집 시작 시 가장 먼저 안내드립니다.
    </p>
    <a class="kakao-btn" href="http://pf.kakao.com/_xmnxfyn" target="_blank">
      💛 카카오톡으로 신청하기
    </a>
  </div>
</div>
</body>
</html>
